<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Technical article by Regis Mfitumukiza." />
    <title>Post | Regis Mfitumukiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="dark-theme">
    <header class="site-header">
      <nav class="container nav">
        <a href="./index.html#hero" class="brand">
          <img src="./icons/favicon-32x32.png" alt="" class="brand-icon" width="24" height="24" aria-hidden="true" />
          <span>MR</span>
        </a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="./index.html#hero">Home</a></li>
          <li><a href="./index.html#about">About</a></li>
          <li><a href="./index.html#projects">Projects</a></li>
          <li><a href="./index.html#skills">Skills</a></li>
          <li><a href="./index.html#timeline">Experience</a></li>
          <li><a href="./index.html#contact">Contact</a></li>
          <li><a href="./blog.html" class="active">Blog</a></li>
        </ul>
        <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Switch to light mode" aria-pressed="false"></button>
      </nav>
    </header>

    <main class="container section post-page">
      <article id="blog-post" class="post-article">
        <a class="back-to-blog" href="./blog.html">&larr; Back to Blog</a>

        <header class="post-header">
          <span id="post-badge" class="blog-badge">JavaScript</span>
          <h1 id="post-title"></h1>
          <p class="post-meta">
            <span id="post-author" class="blog-author"></span>
            <span>•</span>
            <span id="post-date"></span>
            <span>•</span>
            <span id="post-read-time"></span>
          </p>
        </header>

        <img id="post-cover" class="post-cover" src="" alt="" width="1400" height="840" />
        <section id="post-content" class="post-content"></section>

        <footer class="post-footer">
          <div id="post-tags" class="post-tags"></div>
          <div class="post-share">
            <a id="share-linkedin" class="share-btn" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a id="share-twitter" class="share-btn" href="#" target="_blank" rel="noopener noreferrer">Twitter</a>
            <button id="share-copy" class="share-btn" type="button">Copy Link</button>
          </div>
        </footer>

        <section class="comments-section">
          <h2>Comments</h2>
          <div id="comments-list" class="comments-list"></div>

          <form id="comment-form" class="comment-form">
            <div class="comment-form-row">
              <label for="comment-name">Name</label>
              <input id="comment-name" name="name" required />
            </div>
            <div class="comment-form-row">
              <label for="comment-email">Email</label>
              <input id="comment-email" name="email" type="email" required />
            </div>
            <div class="comment-form-row">
              <label for="comment-text">Comment</label>
              <textarea id="comment-text" name="comment" rows="4" required></textarea>
            </div>
            <button type="submit" class="comment-submit">Post Comment</button>
          </form>
        </section>
      </article>
    </main>

    <footer class="site-footer" id="footer">
      <div class="container footer-inner">
        <div class="footer-bottom">
          <p class="footer-copy">&copy; <span class="js-year">2025</span> Mfitumukiza. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
    <script src="./blog-data.js"></script>
    <script src="./blog.js"></script>
  </body>
</html>
